<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Custom Clean YT Player (Pro UI)</title>
    
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #0f1014;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* URL Input Area */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            width: 90%;
            max-width: 800px;
            z-index: 100;
        }

        .input-area input {
            flex: 1;
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #1e222b;
            color: white;
            outline: none;
            font-size: 14px;
        }

        .input-area button {
            padding: 12px 25px;
            border-radius: 8px;
            border: none;
            background: #ffffff;
            color: #000000;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .input-area button:active {
            transform: scale(0.95);
        }

        /* OUTER FRAME: 16:9 Player Container */
        #player-container {
            position: relative;
            width: 90%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: black;
            border-radius: 12px;
            overflow: hidden; /* Hides the cropped YT branding */
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: none; 
        }

        #player-container:fullscreen {
            width: 100%;
            max-width: none;
            border-radius: 0;
        }

        /* INNER FRAME: Cropping Technology */
        .video-cover { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%,-50%); 
            width: 100%; 
            height: 227.77%; /* Pushes top/bottom YT UI out of view */
            pointer-events: none; 
        }
        
        #wrap, #player, iframe { 
            width: 100%; 
            height: 100%; 
            pointer-events: none; 
        }

        /* Shield catches touches on the video area */
        .shield { 
            position: absolute; 
            inset: 0; 
            z-index: 25; 
            cursor: pointer;
        }

        /* YouTube Style Seek Ripple Animation */
        .seek-ripple {
            position: absolute;
            top: 0; bottom: 0;
            width: 40%;
            z-index: 26;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            overflow: hidden;
        }
        .seek-ripple.left { left: 0; }
        .seek-ripple.right { right: 0; }

        .seek-bg {
            position: absolute;
            top: 0; bottom: 0;
            width: 150%;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            transform: scale(0);
            transition: transform 0.2s ease-out;
        }
        .seek-ripple.left .seek-bg { left: -50%; }
        .seek-ripple.right .seek-bg { right: -50%; }

        .seek-ripple.active { opacity: 1; }
        .seek-ripple.active .seek-bg { transform: scale(1); }

        .seek-content {
            position: relative;
            z-index: 2;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 5px;
            font-size: 13px;
            font-weight: bold;
            text-shadow: 0 1px 5px rgba(0,0,0,0.8);
        }
        .seek-content i { font-size: 24px; }

        /* Custom UI Overlay */
        .custom-ui {
            position: absolute;
            inset: 0;
            z-index: 30; 
            display: flex;
            flex-direction: column;
            pointer-events: none; 
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .custom-ui.hide { opacity: 0; }
        .custom-ui.hide button, 
        .custom-ui.hide input[type=range], 
        .custom-ui.hide .settings-menu { pointer-events: none !important; }

        .custom-ui button, 
        .custom-ui input[type=range], 
        .settings-menu { pointer-events: auto; }

        /* TOP RIGHT: Speaker & Settings */
        .top-right-controls {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }

        /* NO BACKGROUND ICONS WITH INVISIBLE LARGE TOUCH AREA */
        .icon-btn {
            position: relative;
            background: transparent;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        /* Invisible expanded touch target */
        .icon-btn::before {
            content: '';
            position: absolute;
            top: -20px; bottom: -20px; left: -20px; right: -20px;
            border-radius: 50%;
        }

        .icon-btn:hover i { transform: scale(1.15); }

        /* CENTER: Play / Pause */
        .center-controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .play-pause-btn {
            background: transparent;
            border: none;
            color: white;
            font-size: 65px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            text-shadow: 0 5px 20px rgba(0,0,0,0.8);
        }

        .play-pause-btn:hover { transform: scale(1.1); }

        /* Pulsing animation for Buffering (Replaces loader) */
        @keyframes pulseBuffer {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        .is-buffering { animation: pulseBuffer 1s infinite; pointer-events: none; }

        /* BOTTOM LINE: Time, Slider, Fullscreen */
        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
        }

        .time-text {
            font-size: 13px;
            font-weight: 600;
            color: white;
            min-width: 45px;
            text-align: center;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }

        /* Custom Slider (Pure White Theme) */
        .progress-slider {
            flex: 1;
            -webkit-appearance: none;
            appearance: none;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            background-image: linear-gradient(#ffffff, #ffffff);
            background-repeat: no-repeat;
            background-size: 0% 100%;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            height: 14px;
            width: 14px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            transition: transform 0.1s;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .progress-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

        /* Custom Scrollable Settings Menu UI */
        .settings-menu {
            position: absolute;
            top: 60px;
            right: 20px;
            background: rgba(20, 20, 20, 0.95);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            width: 220px;
            backdrop-filter: blur(10px);
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            overflow: hidden; 
        }

        .settings-menu.active { display: flex; }

        .setting-row {
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: white;
            transition: background 0.2s;
        }

        .setting-row:hover { background: rgba(255, 255, 255, 0.1); }

        .setting-row span.sub-text {
            font-size: 12px;
            color: #aaa;
            font-weight: 400;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Scrollable Sub-menus */
        #settings-speed, #settings-quality {
            display: none;
            max-height: 150px; /* Forces scroll if content overflows */
            overflow-y: auto;
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        
        #settings-speed::-webkit-scrollbar, #settings-quality::-webkit-scrollbar {
            display: none; /* Hide scrollbar in Chrome/Safari */
        }

        .setting-header {
            position: sticky;
            top: 0;
            background: rgba(20, 20, 20, 0.98);
            padding: 14px 18px;
            font-size: 14px;
            font-weight: bold;
            color: #aaa;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-option {
            padding: 14px 18px;
            font-size: 14px;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .setting-option.active { color: #ffffff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="input-area">
        <input type="text" id="yt-link" placeholder="Paste YouTube link here...">
        <button onclick="loadVideo()">Play</button>
    </div>

    <!-- Main Player Container -->
    <div id="player-container">
        
        <!-- Cropped Iframe Container -->
        <div class="video-cover">
            <div id="wrap">
                <div id="player"></div>
            </div>
        </div>

        <!-- Seek Ripple Overlays -->
        <div class="seek-ripple left" id="ripple-left">
            <div class="seek-bg"></div>
            <div class="seek-content">
                <i class="fas fa-backward"></i>
                <span id="seek-text-left">10 seconds</span>
            </div>
        </div>
        <div class="seek-ripple right" id="ripple-right">
            <div class="seek-bg"></div>
            <div class="seek-content">
                <i class="fas fa-forward"></i>
                <span id="seek-text-right">10 seconds</span>
            </div>
        </div>
        
        <!-- Smart Touch Shield -->
        <div class="shield" id="shield"></div>

        <!-- Custom User Interface Overlay -->
        <div class="custom-ui" id="custom-ui">
            
            <!-- Top Right Controls -->
            <div class="top-right-controls">
                <button class="icon-btn" id="mute-btn" onclick="toggleMute()">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="icon-btn" onclick="toggleSettings()">
                    <i class="fas fa-cog"></i>
                </button>
            </div>

            <!-- Custom Clean Settings Menu -->
            <div class="settings-menu" id="settings-menu">
                <div id="settings-main">
                    <div class="setting-row" onclick="openSubMenu('speed')">
                        <span>Speed</span>
                        <span class="sub-text" id="lbl-speed">Normal <i class="fas fa-chevron-right"></i></span>
                    </div>
                    <div class="setting-row" onclick="openSubMenu('quality')">
                        <span>Quality</span>
                        <span class="sub-text" id="lbl-quality">Auto <i class="fas fa-chevron-right"></i></span>
                    </div>
                </div>

                <div id="settings-speed">
                    <div class="setting-header" onclick="closeSubMenu()"><i class="fas fa-chevron-left"></i> Speed</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(0.25, '0.25x', this)">0.25x</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(0.5, '0.5x', this)">0.5x</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(0.75, '0.75x', this)">0.75x</div>
                    <div class="setting-option speed-opt active" onclick="changeSpeed(1, 'Normal', this)">Normal</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(1.25, '1.25x', this)">1.25x</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(1.5, '1.5x', this)">1.5x</div>
                    <div class="setting-option speed-opt" onclick="changeSpeed(2, '2x', this)">2x</div>
                </div>

                <div id="settings-quality">
                    <div class="setting-header" onclick="closeSubMenu()"><i class="fas fa-chevron-left"></i> Quality</div>
                    <div class="setting-option quality-opt active" onclick="changeQuality('default', 'Auto', this)">Auto</div>
                    <div class="setting-option quality-opt" onclick="changeQuality('hd1080', '1080p', this)">1080p</div>
                    <div class="setting-option quality-opt" onclick="changeQuality('hd720', '720p', this)">720p</div>
                    <div class="setting-option quality-opt" onclick="changeQuality('large', '480p', this)">480p</div>
                    <div class="setting-option quality-opt" onclick="changeQuality('medium', '360p', this)">360p</div>
                </div>
            </div>

            <!-- Center Play / Pause -->
            <div class="center-controls">
                <button class="play-pause-btn" id="center-play-btn" onclick="togglePlayPause()">
                    <i class="fas fa-play" id="center-play-icon"></i>
                </button>
            </div>

            <!-- Bottom Controls -->
            <div class="bottom-controls">
                <span class="time-text" id="current-time">0:00</span>
                <input type="range" id="progress-slider" class="progress-slider" min="0" max="100" value="0">
                <span class="time-text" id="total-time">0:00</span>
                <button class="icon-btn" style="font-size:18px;" onclick="toggleFullscreen()">
                    <i class="fas fa-expand"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- YouTube IFrame API -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <script>
        let ytPlayer = null;
        let currentVideoId = null;
        let isYtApiReady = false;
        let isDraggingSlider = false;
        let uiHideTimer = null;
        let progressInterval = null;

        // Elements
        const playerContainer = document.getElementById('player-container');
        const customUI = document.getElementById('custom-ui');
        const shield = document.getElementById('shield');
        const centerPlayBtn = document.getElementById('center-play-btn');
        const centerPlayIcon = document.getElementById('center-play-icon');
        const slider = document.getElementById('progress-slider');
        const currTimeText = document.getElementById('current-time');
        const totalTimeText = document.getElementById('total-time');
        const muteIcon = document.querySelector('#mute-btn i');
        
        // Menu Elements
        const settingsMenu = document.getElementById('settings-menu');
        const viewMain = document.getElementById('settings-main');
        const viewSpeed = document.getElementById('settings-speed');
        const viewQuality = document.getElementById('settings-quality');
        const lblSpeed = document.getElementById('lbl-speed');
        const lblQuality = document.getElementById('lbl-quality');

        // Ripple Elements
        const rippleLeft = document.getElementById('ripple-left');
        const rippleRight = document.getElementById('ripple-right');
        const txtSeekLeft = document.getElementById('seek-text-left');
        const txtSeekRight = document.getElementById('seek-text-right');

        function onYouTubeIframeAPIReady() { isYtApiReady = true; }

        function extractVideoID(url) {
            const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
            const match = url.match(regex);
            return match ? match[1] : null;
        }

        // 1. Load the Video
        function loadVideo() {
            const url = document.getElementById('yt-link').value;
            currentVideoId = extractVideoID(url);

            if (!currentVideoId) { alert("Invalid YouTube link!"); return; }
            if (!isYtApiReady) { alert("Engine loading, try again in a sec."); return; }

            playerContainer.style.display = 'block';
            
            // Start buffering animation
            centerPlayIcon.className = 'fas fa-pause';
            centerPlayBtn.classList.add('is-buffering');
            showUI();

            if (ytPlayer && ytPlayer.loadVideoById) {
                ytPlayer.loadVideoById(currentVideoId);
                resetMenuUI();
            } else {
                const hostOrigin = window.location.protocol === 'file:' ? '*' : window.location.origin;
                ytPlayer = new YT.Player('player', {
                    videoId: currentVideoId,
                    playerVars: {
                        autoplay: 1, controls: 0, disablekb: 1, fs: 0,
                        modestbranding: 1, rel: 0, playsinline: 1,
                        iv_load_policy: 3, enablejsapi: 1, origin: hostOrigin     
                    },
                    events: {
                        'onReady': onPlayerReady,
                        'onStateChange': onPlayerStateChange
                    }
                });
            }
        }

        // 2. Player Events
        function onPlayerReady(event) {
            event.target.playVideo();
            startProgressTracker();
        }

        function onPlayerStateChange(event) {
            centerPlayBtn.classList.remove('is-buffering');

            if (event.data === YT.PlayerState.PLAYING) {
                centerPlayIcon.className = 'fas fa-pause';
                startHideTimer(); 
            } else if (event.data === YT.PlayerState.PAUSED || event.data === YT.PlayerState.ENDED) {
                centerPlayIcon.className = 'fas fa-play';
                showUI(); 
            } else if (event.data === YT.PlayerState.BUFFERING) {
                centerPlayIcon.className = 'fas fa-pause';
                centerPlayBtn.classList.add('is-buffering');
                showUI(); 
            }
        }

        // 3. Play / Pause
        function togglePlayPause() {
            if (!ytPlayer || !ytPlayer.getPlayerState) return;
            const state = ytPlayer.getPlayerState();
            if (state === YT.PlayerState.PLAYING || state === YT.PlayerState.BUFFERING) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        }

        // 4. Progress Tracker
        function startProgressTracker() {
            if (progressInterval) clearInterval(progressInterval);
            progressInterval = setInterval(() => {
                if (!ytPlayer || !ytPlayer.getDuration || isDraggingSlider) return;
                const cTime = ytPlayer.getCurrentTime();
                const dTime = ytPlayer.getDuration();
                
                if (dTime > 0) {
                    slider.max = dTime;
                    slider.value = cTime;
                    currTimeText.innerText = formatTime(cTime);
                    totalTimeText.innerText = formatTime(dTime);
                    const percent = (cTime / dTime) * 100;
                    slider.style.backgroundSize = `${percent}% 100%`;
                }
            }, 250);
        }

        slider.addEventListener('mousedown', () => isDraggingSlider = true);
        slider.addEventListener('touchstart', () => isDraggingSlider = true);
        slider.addEventListener('input', () => {
            currTimeText.innerText = formatTime(slider.value);
            const percent = (slider.value / slider.max) * 100;
            slider.style.backgroundSize = `${percent}% 100%`;
        });
        const seekVideo = () => { isDraggingSlider = false; if(ytPlayer) ytPlayer.seekTo(slider.value, true); };
        slider.addEventListener('mouseup', seekVideo);
        slider.addEventListener('touchend', seekVideo);

        // 5. Volume
        function toggleMute() {
            if (!ytPlayer) return;
            if (ytPlayer.isMuted()) { ytPlayer.unMute(); muteIcon.className = 'fas fa-volume-up'; } 
            else { ytPlayer.mute(); muteIcon.className = 'fas fa-volume-mute'; }
        }

        // 6. Settings Menu Logic
        function toggleSettings() {
            if (settingsMenu.classList.contains('active')) {
                settingsMenu.classList.remove('active');
                startHideTimer();
            } else {
                closeSubMenu();
                settingsMenu.classList.add('active');
                clearTimeout(uiHideTimer); 
            }
        }

        function openSubMenu(menu) {
            viewMain.style.display = 'none';
            if (menu === 'speed') viewSpeed.style.display = 'block';
            if (menu === 'quality') viewQuality.style.display = 'block';
        }

        function closeSubMenu() {
            viewSpeed.style.display = 'none';
            viewQuality.style.display = 'none';
            viewMain.style.display = 'block';
        }

        function changeSpeed(rate, label, element) {
            if (!ytPlayer) return;
            document.querySelectorAll('.speed-opt').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            ytPlayer.setPlaybackRate(parseFloat(rate));
            lblSpeed.innerHTML = `${label} <i class="fas fa-chevron-right"></i>`;
            settingsMenu.classList.remove('active');
            startHideTimer();
        }

        function changeQuality(quality, label, element) {
            if (!ytPlayer || !currentVideoId) return;
            document.querySelectorAll('.quality-opt').forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            lblQuality.innerHTML = `${label} <i class="fas fa-chevron-right"></i>`;
            const cTime = ytPlayer.getCurrentTime();
            ytPlayer.loadVideoById({ videoId: currentVideoId, startSeconds: cTime, suggestedQuality: quality });
            settingsMenu.classList.remove('active');
            startHideTimer();
        }

        function resetMenuUI() {
            document.querySelectorAll('.speed-opt').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.quality-opt').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.speed-opt')[3].classList.add('active');
            document.querySelectorAll('.quality-opt')[0].classList.add('active');
            lblSpeed.innerHTML = `Normal <i class="fas fa-chevron-right"></i>`;
            lblQuality.innerHTML = `Auto <i class="fas fa-chevron-right"></i>`;
        }

        // 7. Fullscreen
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (playerContainer.requestFullscreen) playerContainer.requestFullscreen();
                else if (playerContainer.webkitRequestFullscreen) playerContainer.webkitRequestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        // 8. Shield Smart Tap & Double Tap Logic
        let tapCount = 0;
        let tapTimer = null;
        let lastTapSide = null;
        let animationTimer = null;

        function showUI() { customUI.classList.remove('hide'); startHideTimer(); }

        function startHideTimer() {
            clearTimeout(uiHideTimer);
            const isPaused = ytPlayer && ytPlayer.getPlayerState && 
                            (ytPlayer.getPlayerState() === YT.PlayerState.PAUSED || ytPlayer.getPlayerState() === YT.PlayerState.ENDED);
            if (!settingsMenu.classList.contains('active') && !isPaused) {
                uiHideTimer = setTimeout(() => {
                    customUI.classList.add('hide');
                    settingsMenu.classList.remove('active');
                }, 3000);
            }
        }

        shield.addEventListener('click', (e) => {
            const rect = shield.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            // Determine Tap Side (Left 35%, Right 35%, Center 30%)
            let side = 'center';
            if (x < rect.width * 0.35) side = 'left';
            else if (x > rect.width * 0.65) side = 'right';

            if (side === 'center') {
                toggleUIOnly();
                tapCount = 0;
                return;
            }

            tapCount++;
            if (tapCount === 1) {
                lastTapSide = side;
                tapTimer = setTimeout(() => {
                    toggleUIOnly(); // Was just a single tap
                    tapCount = 0;
                    lastTapSide = null;
                }, 250);
            } else {
                if (side === lastTapSide) {
                    clearTimeout(tapTimer);
                    triggerDoubleTapSeek(side, tapCount);
                    
                    // Reset tap count slightly after so 3rd/4th consecutive taps chain perfectly
                    tapTimer = setTimeout(() => { 
                        tapCount = 0; 
                        lastTapSide = null; 
                    }, 500);
                } else {
                    // Tapped the opposite side, reset counter
                    clearTimeout(tapTimer);
                    tapCount = 1;
                    lastTapSide = side;
                    tapTimer = setTimeout(() => { toggleUIOnly(); tapCount = 0; lastTapSide = null; }, 250);
                }
            }
        });

        function toggleUIOnly() {
            if (customUI.classList.contains('hide')) showUI();
            else { customUI.classList.add('hide'); settingsMenu.classList.remove('active'); }
        }

        function triggerDoubleTapSeek(side, count) {
            if (!ytPlayer || !ytPlayer.seekTo) return;
            
            const seekAmount = (count - 1) * 10;
            const newTime = ytPlayer.getCurrentTime() + (side === 'left' ? -10 : 10);
            ytPlayer.seekTo(newTime, true);

            // Animate Ripple
            clearTimeout(animationTimer);
            rippleLeft.classList.remove('active');
            rippleRight.classList.remove('active');

            if (side === 'left') {
                txtSeekLeft.innerText = `${seekAmount} seconds`;
                rippleLeft.classList.add('active');
            } else {
                txtSeekRight.innerText = `${seekAmount} seconds`;
                rippleRight.classList.add('active');
            }

            animationTimer = setTimeout(() => {
                rippleLeft.classList.remove('active');
                rippleRight.classList.remove('active');
            }, 600);
        }

        playerContainer.addEventListener('mousemove', () => {
            if (!customUI.classList.contains('hide')) startHideTimer();
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return '0:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' + s : s}`;
        }
    </script>
</body>
</html>
