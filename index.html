<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Google Photos Sync</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root { --primary: #4285F4; --bg: #f5f5f5; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 20px; text-align: center; }
        .header { margin-bottom: 30px; }
        button { background-color: var(--primary); color: white; border: none; padding: 10px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; margin: 5px; transition: 0.3s; }
        button:hover { background-color: #3367D6; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: 0 auto; }
        .photo-card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .photo-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; }
        #status-msg { font-size: 18px; color: #444; margin: 15px 0; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Google Photos Viewer</h1>
        <p>Login and select the photos you want to view</p>
        
        <!-- Updated Buttons -->
        <button id="auth-btn" onclick="authenticate()">1. Sign in with Google</button>
        <button id="pick-btn" onclick="startPicker()" style="display:none; background-color: #0F9D58;">2. Select Photos</button>
        <button id="logout-btn" onclick="logout()" style="display:none; background-color: #d93025;">Logout</button>
    </div>

    <div id="status-msg"></div>
    <div id="gallery" class="gallery"></div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS WITH YOUR EXACT CLIENT ID
        const CLIENT_ID = '866119021637-tk5a9dhs7k95qokr3bvpjmbm9k9l63du.apps.googleusercontent.com'; 
        
        // This is the new Picker API scope required by Google
        const SCOPES = 'https://www.googleapis.com/auth/photospicker.mediaitems.readonly';
        
        let tokenClient;
        let accessToken = null;
        let pollingInterval = null;

        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('auth-btn').style.display = 'none';
                        document.getElementById('pick-btn').style.display = 'inline-block';
                        document.getElementById('logout-btn').style.display = 'inline-block';
                        document.getElementById('status-msg').innerText = "✅ Logged in successfully! Click 'Select Photos' to choose photos from your library.";
                    }
                }
            });
        };

        function authenticate() {
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function logout() {
            if(accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    accessToken = null;
                    if(pollingInterval) clearInterval(pollingInterval);
                    document.getElementById('auth-btn').style.display = 'inline-block';
                    document.getElementById('pick-btn').style.display = 'none';
                    document.getElementById('logout-btn').style.display = 'none';
                    document.getElementById('gallery').innerHTML = '';
                    document.getElementById('status-msg').innerText = "Logged out.";
                });
            }
        }

        // STEP 1: Ask Google to create a Picker Session
        async function startPicker() {
            if (!accessToken) return;
            const statusMsg = document.getElementById('status-msg');
            const gallery = document.getElementById('gallery');
            
            statusMsg.innerText = 'Initializing Google Photos Picker...';
            gallery.innerHTML = '';

            try {
                const sessionRes = await fetch('https://photospicker.googleapis.com/v1/sessions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                if(!sessionRes.ok) throw new Error("Failed to create session. Check if Picker API is enabled in Google Cloud.");
                
                const sessionData = await sessionRes.json();
                const sessionId = sessionData.id;

                // Open the secure popup window so you can pick photos
                statusMsg.innerText = 'A popup window should open. Waiting for you to select photos...';
                window.open(sessionData.pickerUri, 'GooglePhotosPicker', 'width=800,height=700,left=200,top=100');

                // Start checking every 3 seconds if you are done picking photos
                if(pollingInterval) clearInterval(pollingInterval);
                pollingInterval = setInterval(() => pollSession(sessionId), 3000);

            } catch (error) {
                console.error(error);
                statusMsg.innerHTML = '<span style="color:red;">Error starting picker. Check console (F12).</span>';
            }
        }

        // STEP 2: Wait until the user closes the popup
        async function pollSession(sessionId) {
            try {
                const res = await fetch(`https://photospicker.googleapis.com/v1/sessions/${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const sessionData = await res.json();
                
                // If mediaItemsSet is true, it means you clicked "Done" in the popup!
                if (sessionData.mediaItemsSet) {
                    clearInterval(pollingInterval);
                    document.getElementById('status-msg').innerText = 'Photos selected! Fetching images...';
                    fetchSelectedPhotos(sessionId);
                }
            } catch (error) {
                console.error('Error polling session:', error);
            }
        }

        // STEP 3: Display the chosen photos
        async function fetchSelectedPhotos(sessionId) {
            const gallery = document.getElementById('gallery');
            const statusMsg = document.getElementById('status-msg');

            try {
                const response = await fetch(`https://photospicker.googleapis.com/v1/mediaItems?sessionId=${sessionId}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });

                const data = await response.json();
                statusMsg.innerText = ''; // Clear message

                if (data.mediaItems && data.mediaItems.length > 0) {
                    data.mediaItems.forEach(item => {
                        // The Picker API puts the link inside "mediaFile.baseUrl"
                        if(item.mediaFile && item.mediaFile.baseUrl) {
                            const imgUrl = item.mediaFile.baseUrl + '=w400-h400-c'; // Add cropping settings
                            
                            const card = document.createElement('div');
                            card.className = 'photo-card';
                            
                            const img = document.createElement('img');
                            img.src = imgUrl;

                            card.appendChild(img);
                            gallery.appendChild(card);
                        }
                    });
                } else {
                    statusMsg.innerText = 'No photos were selected.';
                }
            } catch (error) {
                console.error('Error fetching photos:', error);
                statusMsg.innerHTML = '<span style="color:red;">Error fetching photos.</span>';
            }
        }
    </script>
</body>
</html>
