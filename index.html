<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Google Photos Sync</title>
    <!-- Load Google Identity Services library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    <style>
        :root {
            --primary: #4285F4;
            --bg: #f5f5f5;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            margin-bottom: 30px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3367D6;
        }
        /* Grid setup for the photos */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .photo-card img {
            width: 100%;
            height: 200px;
            object-fit: cover; /* Keeps images beautifully cropped */
            border-radius: 4px;
        }
        .loading {
            font-size: 18px;
            color: #666;
            display: none;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Google Photos Viewer</h1>
        <p>Login to sync and view your recent photos</p>
        <button id="auth-btn" onclick="authenticate()">Sign in with Google</button>
        <button id="logout-btn" onclick="logout()" style="display:none; background-color: #d93025;">Logout</button>
    </div>

    <div id="loading" class="loading">Fetching photos... Please wait.</div>
    <div id="gallery" class="gallery"></div>

    <script>
        // --- CONFIGURATION ---
        // REPLACE THIS WITH YOUR CLIENT ID FROM GOOGLE CLOUD
        const CLIENT_ID = '866119021637-tk5a9dhs7k95qokr3bvpjmbm9k9l63du.apps.googleusercontent.com'; 
        const SCOPES = 'https://www.googleapis.com/auth/photoslibrary.readonly';
        
        let tokenClient;
        let accessToken = null;

        // Initialize Google Identity Services when the page loads
        window.onload = function () {
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: (tokenResponse) => {
                    if (tokenResponse && tokenResponse.access_token) {
                        accessToken = tokenResponse.access_token;
                        document.getElementById('auth-btn').style.display = 'none';
                        document.getElementById('logout-btn').style.display = 'inline-block';
                        fetchPhotos();
                    }
                }
            });
        };

        // Trigger OAuth popup
        function authenticate() {
            tokenClient.requestAccessToken({prompt: 'consent'});
        }

        function logout() {
            if(accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    accessToken = null;
                    document.getElementById('auth-btn').style.display = 'inline-block';
                    document.getElementById('logout-btn').style.display = 'none';
                    document.getElementById('gallery').innerHTML = '';
                });
            }
        }

        // Fetch photos using the Access Token
        async function fetchPhotos() {
            if (!accessToken) return;
            
            const gallery = document.getElementById('gallery');
            const loading = document.getElementById('loading');
            
            gallery.innerHTML = '';
            loading.style.display = 'block';

            try {
                const response = await fetch('https://photoslibrary.googleapis.com/v1/mediaItems?pageSize=20', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                loading.style.display = 'none';

                if (data.mediaItems && data.mediaItems.length > 0) {
                    data.mediaItems.forEach(item => {
                        // The Photos API requires appending parameters to baseUrl to get the actual image file
                        // =w400-h400-c gets a cropped 400x400 image
                        const imgUrl = item.baseUrl + '=w400-h400-c';
                        
                        const card = document.createElement('div');
                        card.className = 'photo-card';
                        
                        const img = document.createElement('img');
                        img.src = imgUrl;
                        img.alt = item.filename;

                        card.appendChild(img);
                        gallery.appendChild(card);
                    });
                } else {
                    gallery.innerHTML = '<p>No photos found in this account.</p>';
                }
            } catch (error) {
                loading.style.display = 'none';
                console.error('Error fetching photos:', error);
                gallery.innerHTML = '<p style="color:red;">Error fetching photos. Check console for details.</p>';
            }
        }
    </script>
</body>
</html>
